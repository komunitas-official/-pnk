<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNK - Secured Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --dark-bg: #050505;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .hidden { display: none !important; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .glitch {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.75), -0.025em -0.025em 0 rgba(0,255,0,0.75), -0.025em -0.05em 0 rgba(0,0,255,0.75); }
        }

        .bar-container {
            width: 300px;
            height: 5px;
            background: #222;
            margin-top: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            transition: width 0.1s;
        }

        /* --- UI COMPONENTS --- */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-blue);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        h2 { color: var(--neon-blue); text-align: center; margin-bottom: 25px; letter-spacing: 3px; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- MEMBER CARD --- */
        #id-card {
            width: 350px;
            height: 220px;
            background: linear-gradient(45deg, #0a0a0a, #1a1a1a);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            margin: 0 auto 20px;
        }

        #id-card::before {
            content: "PNK VERIFIED";
            position: absolute;
            top: 10px; right: 10px;
            font-size: 10px;
            color: var(--neon-blue);
            opacity: 0.5;
        }

        .card-title { font-size: 20px; color: var(--neon-blue); border-bottom: 1px solid var(--neon-blue); padding-bottom: 5px; margin-bottom: 15px; }
        .card-info { font-size: 14px; margin: 5px 0; }
        .card-info span { color: var(--neon-blue); }

    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="loader">
        <div class="glitch">PNK SYSTEM LOADING...</div>
        <div class="bar-container">
            <div id="bar" class="bar-fill"></div>
        </div>
    </div>

    <div id="login-page" class="container hidden">
        <div class="glass-card">
            <h2>PNK GATEWAY</h2>
            <input type="text" id="user" placeholder="Username / ID">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="changePage('login-page', 'register-page')">LOGIN SYSTEM</button>
        </div>
    </div>

    <div id="register-page" class="container hidden">
        <div class="glass-card" style="max-width: 600px;">
            <h2>PNK DATABASE</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="nama" placeholder="Nama Lengkap">
                <input type="number" id="umur" placeholder="Umur">
                <input type="date" id="tgl">
                <select id="gender">
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
                <input type="text" id="tiktok" placeholder="Username TikTok">
                <input type="text" id="asal" placeholder="Asal Daerah">
            </div>
            <textarea id="alasan" placeholder="Alasan bergabung dengan PNK..." rows="3"></textarea>
            <button onclick="createMember()">GENERATE MEMBER CARD</button>
        </div>
    </div>

    <div id="card-page" class="container hidden">
        <div class="glass-card">
            <div id="id-card">
                <div class="card-title">MEMBER CARD</div>
                <div class="card-info">NAME: <span id="disp-nama"></span></div>
                <div class="card-info">ORIGIN: <span id="disp-asal"></span></div>
                <div class="card-info">IDENTITY: <span id="disp-id"></span></div>
                <div class="card-info">ACCESS: <span>TIER 1 (PROTECTION)</span></div>
                <div style="margin-top: 20px; font-size: 10px; color: #555;">Sistem AI Cerdas PNK v3.0</div>
            </div>
            <button onclick="downloadAndJoin()">DOWNLOAD & JOIN GRUP</button>
        </div>
    </div>

    <script>
        // --- ANIMASI MATRIX (AI CERDAS LOOK) ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const char = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f3ff';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = char[Math.floor(Math.random() * char.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- SISTEM LOADING ---
        let bar = document.getElementById('bar');
        let width = 0;
        let loadInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadInterval);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('login-page').classList.remove('hidden');
            } else {
                width++;
                bar.style.width = width + '%';
            }
        }, 30);

        // --- NAVIGASI & FITUR ---
        function changePage(hide, show) {
            document.getElementById(hide).classList.add('hidden');
            document.getElementById(show).classList.remove('hidden');
        }

        function createMember() {
            const n = document.getElementById('nama').value;
            const a = document.getElementById('asal').value;
            if(!n || !a) return alert("Harap lengkapi database!");

            document.getElementById('disp-nama').innerText = n.toUpperCase();
            document.getElementById('disp-asal').innerText = a.toUpperCase();
            document.getElementById('disp-id').innerText = "PNK-" + Math.floor(Math.random()*99999);
            
            changePage('register-page', 'card-page');
        }

        function downloadAndJoin() {
            const card = document.getElementById('id-card');
            html2canvas(card).then(canvas => {
                const link = document.createElement('a');
                link.download = 'PNK-CARD-' + Date.now() + '.png';
                link.href = canvas.toDataURL();
                link.click();

                alert("Kartu terunduh. Mengalihkan ke Gerbang Keamanan WhatsApp...");
                setTimeout(() => {
                    window.location.href = "https://chat.whatsapp.com/Gs6nXWDJVEw9YVCzjBFWHi";
                }, 2000);
            });
        }

        // KEAMANAN KETAT: Disable klik kanan & Inspect
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
